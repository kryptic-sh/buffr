# buffr configuration â€” copy to ~/.config/buffr/config.toml on Linux,
# ~/Library/Application Support/buffr/config.toml on macOS, or
# %APPDATA%\buffr\config.toml on Windows. Every key has a default;
# omitted entries fall back to the values shown below.

[general]
# Initial URL on first window when no session is restored.
homepage = "https://example.com"
# Single-character leader. Vim default is "\\". Engine validates this
# is exactly one Unicode scalar value at startup; multi-char strings
# are rejected with an error pointing at general.leader.
leader = "\\"

[startup]
# Reopen the previous session's tabs on launch. Phase 5 work â€” the
# field is parsed but the session-store glue lands later.
restore_session = false
# URL the `t` (tab_new) action navigates to on a fresh tab.
new_tab_url = "about:blank"

[search]
# Must match a key under [search.engines.<name>].
default_engine = "duckduckgo"

[search.engines.duckduckgo]
url = "https://duckduckgo.com/?q={query}"

[search.engines.google]
url = "https://www.google.com/search?q={query}"

[theme]
# Hex accent. Status line, omnibar caret, hint label background.
accent = "#7aa2f7"
# auto | dark | light. `auto` follows the desktop's appearance hint.
mode = "auto"
# Phase 6 a11y: switch chrome to a high-contrast palette
# (white-on-black with a saturated yellow accent). See
# `docs/accessibility.md` for the colour values.
high_contrast = false

[privacy]
# Opt-in **local-only** usage counters. When `true`, buffr accumulates
# anonymous integer counters (app_starts, tabs_opened, pages_loaded,
# searches_run, bookmarks_added, downloads_completed) and writes them
# to `<data>/usage-counters.json` for the user to inspect. No network
# endpoint exists; buffr never sends telemetry anywhere. Even on opt-in
# the counters stay local. See `docs/privacy.md`.
enable_telemetry = false
# Categories wiped on shutdown. Each entry is processed independently:
# one failure doesn't skip the rest. Successes log at INFO; failures
# at WARN. Order in the list does not matter.
#
# Valid entries:
#   "cookies"        â€” flush every cookie via CEF's global cookie
#                      manager.
#   "cache"          â€” delete <root_cache_path>/Cache (recreated on
#                      next startup).
#   "history"        â€” wipe every row in history.sqlite.
#   "bookmarks"      â€” wipe every row in bookmarks.sqlite. Destructive;
#                      only honored when listed.
#   "downloads"      â€” wipe every row in downloads.sqlite (regardless
#                      of status).
#   "local_storage"  â€” delete <root_cache_path>/Local Storage.
#
# Example: paranoid web-browsing â€” wipe cookies, cache, and local
# storage on exit; keep history + bookmarks.
#
# clear_on_exit = ["cookies", "cache", "local_storage"]
clear_on_exit = []
# Permissions store lives at <data>/permissions.sqlite. Use the
# `--list-permissions` / `--clear-permissions` / `--forget-origin` CLI
# flags to inspect or reset the table without launching CEF. Adding
# `permissions` to `clear_on_exit` is reserved (Phase 5 follow-up); for
# now use `--clear-permissions` to wipe the table.

[downloads]
# Directory downloads land in. If unset (the default), buffr resolves
# at runtime in this order:
#   1. directories::UserDirs::download_dir() (XDG_DOWNLOAD_DIR on
#      Linux; ~/Downloads on macOS; %USERPROFILE%\Downloads on Windows)
#   2. $HOME/Downloads as a last-resort fallback.
# default_dir = "/home/me/Downloads"
#
# Open the file via the platform's launcher (xdg-open / open / start)
# the moment a download finishes. Default false.
open_on_finish = false
# Show a save-as dialog for every download. The dialog UI is Phase 3
# chrome work; for now downloads silently land in default_dir
# regardless of this setting.
ask_each_time = false

[hint]
# Ordered character list used to mint hint labels. Validated as
# non-empty, ASCII-only, no duplicates, â‰Ą 2 chars. Default mirrors
# Vimium's home-row + upper-row alphabet. For full keyboard reach use
# "abcdefghijklmnopqrstuvwxyz"; for strict home-row use "asdfjkl;".
alphabet = "asdfghjkl;weruio"

[crash_reporter]
# Opt-in local panic reporter. When `true`, buffr installs a Rust
# panic hook that writes JSON crash files under `<data>/crashes/`.
# Reports stay on disk for the user to inspect or mail; nothing is
# uploaded. CEF native-crash capture (crashpad/breakpad) is not yet
# configured â€” see `docs/privacy.md`.
enabled = false
# Cutoff for `--purge-crashes`. Reports older than this many days are
# removed. Default 30.
purge_after_days = 30

[updates]
# Phase 6 update channel. The ONLY network request buffr makes by
# default â€” one HTTP GET per `check_interval_hours` against the
# GitHub releases API, no PII. Set `enabled = false` to disable
# entirely; that path makes ZERO network calls. See
# `docs/privacy.md` and `docs/updates.md`.
enabled = true
# `stable` (today) or `nightly` (reserved for the post-1.0 nightly
# tag stream).
channel = "stable"
# Minimum hours between live `--check-for-updates` queries. Reads
# inside the window come from the on-disk cache.
check_interval_hours = 24
# `owner/repo` slug. Forks override this.
github_repo = "kryptic-sh/buffr"

[accessibility]
# Phase 6 a11y: enable CEF's renderer accessibility tree by passing
# `--force-renderer-accessibility` through the App command-line hook.
# Platform screen readers (Orca/AT-SPI on Linux, VoiceOver on macOS,
# NVDA/JAWS on Windows) consume that tree. Default `false` because
# building the tree adds a non-trivial per-frame cost; users with an
# AT should turn it on. See `docs/accessibility.md`.
force_renderer_accessibility = false

# ----------------------------------------------------------------------
# Keymap overrides
# ----------------------------------------------------------------------
#
# Each `[keymap.<mode>]` table maps a vim-notation key sequence to a
# PageAction. Values are strings using snake_case action names. Unit
# variants are bare names ("scroll_down"); count-bearing scrolls take
# a parenthesised count ("scroll_down(3)"); `find` takes a named
# `forward` boolean ("find(forward = true)"). Mode transitions use
# `enter_mode("normal" | "visual" | "command" | "hint")`.
#
# Bindings overlay on top of the built-in defaults â€” entries here
# override individual rows; everything not listed keeps its default.
#
# Every binding is validated at load time. An invalid action name or
# unparseable key sequence aborts startup with a line/column-tagged
# error.

[keymap.normal]
"j" = "scroll_down"
"k" = "scroll_up"
"gg" = "scroll_top"
"G" = "scroll_bottom"
"<C-d>" = "scroll_half_page_down"
"<C-u>" = "scroll_half_page_up"
"H" = "history_back"
"L" = "history_forward"
"r" = "reload"
"<C-r>" = "reload_hard"
"o" = "open_omnibar"
":" = "open_command_line"
"f" = "enter_hint_mode"
"/" = "find(forward = true)"
"?" = "find(forward = false)"
"n" = "find_next"
"N" = "find_prev"
"y" = "yank_url"

[keymap.visual]
"<Esc>" = "enter_mode(\"normal\")"

[keymap.command]
"<Esc>" = "enter_mode(\"normal\")"

[keymap.hint]
"<Esc>" = "enter_mode(\"normal\")"
