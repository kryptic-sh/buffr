name: Release

on:
  push:
    tags:
      - 'v*'
  # Manual re-runs are safe: xtask packaging is idempotent and
  # softprops/action-gh-release skips files already attached to the release.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: linux package (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux64
          - runner: ubuntu-24.04-arm
            platform: linuxarm64
    env:
      CEF_PATH: ${{ github.workspace }}/vendor/cef/${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "v$CARGO_VER" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match workspace.package version v$CARGO_VER"
            exit 1
          fi

      - name: Install CEF runtime + packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libxcomposite1 libxdamage1 libxrandr2 libxkbcommon0 libxshmfence1 \
            libdrm2 libgbm1 libpango-1.0-0 libasound2-dev \
            libx11-xcb1 libxcb-dri3-0 libcups2 libxss1 libxtst6 \
            libxkbcommon0 libxkbcommon-x11-0 libxcb-xkb1 \
            libgl1 libegl1 libgles2 \
            dpkg dpkg-dev fakeroot file libxml2-utils \
            rpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-release-${{ matrix.platform }}

      - name: Cache CEF binary distribution
        uses: actions/cache@v5
        with:
          path: vendor/cef
          key: cef-${{ matrix.platform }}-${{ hashFiles('xtask/src/main.rs') }}

      - name: Fetch CEF
        run: cargo xtask fetch-cef --target ${{ matrix.platform }}

      - name: Package Linux (deb + rpm)
        run: cargo xtask package-linux --release --variant all

      - name: List artifacts
        run: ls -la target/dist/linux/

      - name: Compute sha256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd target/dist/linux
          for f in buffr-*.deb buffr-*.rpm buffr-*.tar.gz; do
            [ -e "$f" ] || continue
            sha256sum "$f" > "$f.sha256"
            echo "sha256: $(cat "$f.sha256")"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/dist/linux/buffr-*.deb
            target/dist/linux/buffr-*.deb.sha256
            target/dist/linux/buffr-*.rpm
            target/dist/linux/buffr-*.rpm.sha256
            target/dist/linux/buffr-*.tar.gz
            target/dist/linux/buffr-*.tar.gz.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  macos:
    # Apple Silicon only. Intel Mac (macos-13 / macosx64) was dropped
    # in 0.1.14 — see README "Why no Intel Mac?" — the GitHub runner
    # pool was queueing 1-2h per leg and blocking the publish pipeline.
    name: macOS package (macosarm64)
    runs-on: macos-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "v$CARGO_VER" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match workspace.package version v$CARGO_VER"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-release-macosarm64

      - name: Cache CEF binary distribution
        uses: actions/cache@v5
        with:
          path: vendor/cef
          key: cef-macosarm64-${{ hashFiles('xtask/src/main.rs') }}

      - name: Fetch CEF (macosarm64)
        run: cargo xtask fetch-cef --target macosarm64

      - name: Bundle macOS .app
        run: cargo xtask bundle-macos --release

      - name: Package macOS .dmg
        run: cargo xtask package-macos-dmg --release

      - name: List artifacts
        run: ls -la target/dist/macos/

      - name: Compute sha256 checksums
        shell: bash
        run: |
          set -euo pipefail
          cd target/dist/macos
          for f in buffr-*.dmg; do
            [ -e "$f" ] || continue
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$f" > "$f.sha256"
            else
              shasum -a 256 "$f" > "$f.sha256"
            fi
            echo "sha256: $(cat "$f.sha256")"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/dist/macos/buffr-*.dmg
            target/dist/macos/buffr-*.dmg.sha256
          fail_on_unmatched_files: true
          generate_release_notes: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows:
    name: Windows package (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows64
            rust_target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            platform: windowsarm64
            rust_target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "v$CARGO_VER" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match workspace.package version v$CARGO_VER"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-release-${{ matrix.platform }}

      - name: Install WiX 3 toolset
        run: choco install -y wixtoolset
        shell: powershell

      - name: Add WiX to PATH
        run:
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File
          -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Cache CEF binary distribution
        uses: actions/cache@v5
        with:
          path: vendor/cef
          key: cef-${{ matrix.platform }}-${{ hashFiles('xtask/src/main.rs') }}

      - name: Fetch CEF (${{ matrix.platform }})
        run: cargo xtask fetch-cef --target ${{ matrix.platform }}

      - name: Build binaries (release)
        run: cargo build --release -p buffr-bin -p buffr-helper

      - name: Package Windows MSI
        run: cargo xtask package-windows-msi --release

      - name: List artifacts
        run: dir target\dist\windows\
        shell: cmd

      - name: Compute sha256 checksums
        shell: pwsh
        run: |
          Get-ChildItem target\dist\windows\buffr-*.msi | ForEach-Object {
            $f = $_.FullName
            $hash = (Get-FileHash -Algorithm SHA256 $f).Hash.ToLower()
            $name = $_.Name
            "$hash  $name" | Out-File -Encoding ASCII "$f.sha256"
            Write-Host "sha256: $hash  $name"
          }

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/dist/windows/buffr-*.msi
            target/dist/windows/buffr-*.msi.sha256
          fail_on_unmatched_files: true
          generate_release_notes: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  flatpak:
    name: Flatpak bundle (${{ matrix.arch }})
    needs: [linux]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            tar_arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
            tar_arch: aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Install flatpak + flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            flatpak flatpak-builder

      - name: Add flathub remote + install runtime
        run: |
          flatpak remote-add --if-not-exists --user flathub \
            https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub \
            org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Download buffr tarball from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          gh release download "v$VERSION" \
            -p "buffr-${VERSION}-${{ matrix.tar_arch }}.tar.gz" \
            -D flatpak/

      - name: Stage tarball payload
        run: |
          set -euo pipefail
          cd flatpak
          # Extract straight into `payload/` so the manifest's source
          # `path: payload` resolves. `--strip-components=1` drops the
          # tarball's top-level `buffr-<ver>-<arch>/` wrapper. Avoids
          # the `mv buffr-*-*` glob, which also matched the .tar.gz
          # itself and produced a "target 'payload': No such file" mv
          # error when given two sources.
          mkdir payload
          tar xzf buffr-*.tar.gz -C payload --strip-components=1

      - name: Stage icon
        run: |
          # Manifest expects sh.kryptic.buffr.png next to it; canonical
          # icon lives at pkg/buffr.png. flatpak-builder rejects sources
          # outside the manifest dir, so copy it in.
          cp pkg/buffr.png flatpak/sh.kryptic.buffr.png

      - name: Build flatpak bundle
        run: |
          set -euo pipefail
          cd flatpak
          flatpak-builder --user --force-clean --repo=repo build sh.kryptic.buffr.yml
          VERSION="${GITHUB_REF_NAME#v}"
          flatpak build-bundle repo \
            "buffr-${VERSION}-${{ matrix.arch }}.flatpak" sh.kryptic.buffr

      - name: Compute sha256 checksum
        run: |
          cd flatpak
          for f in buffr-*.flatpak; do
            sha256sum "$f" > "$f.sha256"
            echo "sha256: $(cat "$f.sha256")"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            flatpak/buffr-*.flatpak
            flatpak/buffr-*.flatpak.sha256
          fail_on_unmatched_files: true
          generate_release_notes: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  snap:
    name: Snap bundle (${{ matrix.arch }})
    needs: [linux]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
            tar_arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: arm64
            tar_arch: aarch64
    steps:
      - uses: actions/checkout@v6

      - name: Download buffr tarball from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          gh release download "v$VERSION" \
            -p "buffr-${VERSION}-${{ matrix.tar_arch }}.tar.gz" \
            -D snap/

      - name: Stage tarball payload
        run: |
          set -euo pipefail
          # snapcraft resolves `source: payload` relative to the
          # project root (the dir containing snap/snapcraft.yaml's
          # parent), not the `snap/` dir, so stage at repo root.
          mkdir payload
          tar xzf snap/buffr-*.tar.gz -C payload --strip-components=1

      - name: Pin snap version to tag
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # snapcraft.yaml ships `version: "0.1.0"` as a placeholder so
          # local builds work; rewrite to the live tag before snapcraft
          # consumes it.
          sed -i "s/^version: .*/version: \"${VERSION}\"/" snap/snapcraft.yaml

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft
        with:
          path: .

      - name: Rename snap to versioned filename
        run: |
          set -euo pipefail
          mv "${{ steps.snapcraft.outputs.snap }}" \
             "buffr-${GITHUB_REF_NAME#v}-${{ matrix.arch }}.snap"

      - name: Compute sha256 checksum
        run: |
          for f in buffr-*.snap; do
            sha256sum "$f" > "$f.sha256"
            echo "sha256: $(cat "$f.sha256")"
          done

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            buffr-*.snap
            buffr-*.snap.sha256
          fail_on_unmatched_files: true
          generate_release_notes: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # AUR auto-publish for `buffr-bin`. Pulls the just-uploaded tarball
  # checksums off the release, renders pkg/aur/PKGBUILD-bin.in,
  # generates .SRCINFO, and pushes to the AUR repo over SSH. Lives in
  # release.yml (not a separate workflow) because GITHUB_TOKEN-created
  # releases don't fire downstream `on: release` triggers; running as a
  # `needs: [linux]` job sidesteps the cascade entirely.
  #
  # Required org/repo secret:
  #   AUR_SSH_KEY  — ed25519 private key whose public half is registered
  #                  on the AUR account that owns the `buffr-bin` package.
  aur-bin:
    name: Publish buffr-bin to AUR
    needs: [linux]
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install build deps
        run: |
          set -euo pipefail
          # base-devel pulls in makepkg + fakeroot. openssh + git for
          # the AUR push. curl fetches the sha256 sidecars off the
          # release without needing the GitHub CLI.
          pacman -Sy --noconfirm --needed base-devel git openssh curl

      - uses: actions/checkout@v6

      - name: Resolve version
        id: tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release tag: $TAG (pkgver=$VERSION)"

      - name: Fetch tarball sha256 sidecars
        id: sha
        run: |
          set -euo pipefail
          V="${{ steps.tag.outputs.version }}"
          BASE="https://github.com/kryptic-sh/buffr/releases/download/v${V}"
          # The linux matrix uploaded both arches before this job ran
          # (we `needs: [linux]`), so the sidecars are guaranteed to exist.
          for arch in x86_64 aarch64; do
            curl -fsSL "$BASE/buffr-${V}-${arch}.tar.gz.sha256" -o "sha.${arch}"
          done
          # sidecar format: `<hash>  <filename>` — keep first column.
          echo "x86_64=$(awk '{print $1}' sha.x86_64)" >> "$GITHUB_OUTPUT"
          echo "aarch64=$(awk '{print $1}' sha.aarch64)" >> "$GITHUB_OUTPUT"

      - name: Render PKGBUILD
        run: |
          set -euo pipefail
          mkdir -p out
          sed \
            -e "s/{VERSION}/${{ steps.tag.outputs.version }}/g" \
            -e "s/{SHA256_X86_64}/${{ steps.sha.outputs.x86_64 }}/g" \
            -e "s/{SHA256_AARCH64}/${{ steps.sha.outputs.aarch64 }}/g" \
            pkg/aur/PKGBUILD-bin.in > out/PKGBUILD
          echo "--- rendered PKGBUILD ---"
          cat out/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          set -euo pipefail
          # makepkg refuses to run as root. The archlinux:latest image's
          # `nobody` user has an expired password (`su: User account has
          # expired`), so we provision a fresh build user instead.
          useradd -m builder
          chown -R builder:builder out
          # `su` parses options BEFORE the username; anything after gets
          # passed to the shell. The previous form `su builder -s /bin/bash
          # -c '...'` made bash read commands from stdin (`-s`) and exit
          # silently with code 0 — makepkg never ran. Put `-s` first.
          su -s /bin/bash builder -c 'cd out && makepkg --printsrcinfo > .SRCINFO'
          echo "--- .SRCINFO ---"
          cat out/.SRCINFO

      - name: Configure SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          install -dm700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

      - name: Push to AUR
        # `GIT_SSH_COMMAND` injects ssh options inline so we don't depend on
        # `~/.ssh/config` parsing (heredoc indent broke it previously) or on
        # `ssh-keyscan` output. `accept-new` writes the AUR host key to
        # known_hosts on first connect; subsequent connects strict-verify.
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts"
        run: |
          set -euo pipefail
          git config --global user.name  "buffr-ci"
          git config --global user.email "ci@kryptic.sh"
          git clone ssh://aur@aur.archlinux.org/buffr-bin.git aur-repo
          # PKGBUILD + .SRCINFO are required; LICENSE (0BSD on the
          # PKGBUILD itself) and .gitignore (exclude-all + force-add)
          # are wiki recommendations.
          cp out/PKGBUILD out/.SRCINFO aur-repo/
          cp pkg/aur/LICENSE pkg/aur/.gitignore aur-repo/
          cd aur-repo
          git add PKGBUILD .SRCINFO LICENSE .gitignore
          if git diff --cached --quiet; then
            echo "no changes vs current AUR head; nothing to push"
            exit 0
          fi
          git commit -m "buffr-bin ${{ steps.tag.outputs.version }}-1"
          git push origin master

  # The 9 buffr-* library crates are versioned and released independently
  # via their own submodule repos. Only the `buffr` crates.io stub
  # (apps/buffr-stub) tracks the umbrella tag — it's a "go grab the
  # release artifact" message and ships with each umbrella version so
  # `cargo install buffr` always points at the matching binary release.
  publish-stub:
    name: Publish buffr stub to crates.io
    needs: [linux, macos, windows, flatpak, snap, aur-bin]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Verify stub version matches tag
        shell: bash
        run: |
          STUB_VER=$(grep -m1 '^version' apps/buffr-stub/Cargo.toml | cut -d'"' -f2)
          if [ "v$STUB_VER" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match buffr-stub version v$STUB_VER"
            exit 1
          fi

      # Idempotent: `cargo publish` returns non-zero with "crate version
      # already uploaded" on retry. Tolerate that so manual workflow_dispatch
      # re-runs don't fail.
      - name: Publish stub
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          out=$(cargo publish --manifest-path apps/buffr-stub/Cargo.toml 2>&1)
          status=$?
          echo "$out"
          if [ $status -ne 0 ]; then
            if echo "$out" | grep -q "already uploaded"; then
              echo "stub already published — treating as success"
              exit 0
            fi
            exit $status
          fi
