name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux build + lint + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CEF_PATH: ${{ github.workspace }}/vendor/cef/linux64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: install CEF runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libxcomposite1 libxdamage1 libxrandr2 libxkbcommon0 libxshmfence1 \
            libdrm2 libgbm1 libpango-1.0-0 libasound2-dev \
            libx11-xcb1 libxcb-dri3-0 libcups2 libxss1 libxtst6 \
            libxkbcommon0 libxkbcommon-x11-0 libxcb-xkb1 \
            libgl1 libegl1 libgles2 \
            xvfb

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-build

      - name: cache CEF binary distribution
        uses: actions/cache@v5
        with:
          path: vendor/cef
          key: cef-linux64-${{ hashFiles('xtask/src/main.rs') }}

      - name: fetch CEF
        run: cargo xtask fetch-cef

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace -- --nocapture

      - name: smoke test (xvfb)
        run: |
          set +e
          cd target/debug
          # Launch under Xvfb. Expect buffr to initialize CEF, open a
          # window, and load the homepage. We give it 12s before SIGTERM
          # since CEF cold-init on a CI VM is slow; SIGKILL 5s after
          # that. Exit codes: 0 (clean exit, unlikely) or 124 (timeout
          # hit, expected) or 143 (SIGTERM).
          LD_LIBRARY_PATH=. timeout --signal=TERM --kill-after=5 12s \
            xvfb-run -a --server-args='-screen 0 1280x800x24' \
            ./buffr 2>&1 | tee smoke.log
          rc=${PIPESTATUS[0]}
          set -e
          # Hard-fail on any FATAL/abort/segfault marker.
          if grep -E "FATAL:|Aborted|Segmentation fault|invalid version" smoke.log; then
            echo "::error::smoke test detected fatal markers"
            exit 1
          fi
          # Require positive evidence CEF + browser host came up.
          if ! grep -qE "cef initialized|browser host created" smoke.log; then
            echo "::error::no positive success marker in smoke log"
            exit 1
          fi
          # Accept clean exit (0), our timeout (124), or SIGTERM (143).
          case "$rc" in
            0|124|143) ;;
            *)
              echo "::error::unexpected exit code $rc"
              exit 1
              ;;
          esac
          echo "smoke test passed (rc=$rc)"

  linux-osr:
    name: linux build + lint (osr feature)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CEF_PATH: ${{ github.workspace }}/vendor/cef/linux64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: install CEF runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libxcomposite1 libxdamage1 libxrandr2 libxkbcommon0 libxshmfence1 \
            libdrm2 libgbm1 libpango-1.0-0 libasound2-dev \
            libx11-xcb1 libxcb-dri3-0 libcups2 libxss1 libxtst6 \
            libxkbcommon0 libxkbcommon-x11-0 libxcb-xkb1 \
            libgl1 libegl1 libgles2

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-build-osr

      - name: cache CEF binary distribution
        uses: actions/cache@v5
        with:
          path: vendor/cef
          key: cef-linux64-${{ hashFiles('xtask/src/main.rs') }}

      - name: fetch CEF
        run: cargo xtask fetch-cef

      # No smoke test for the osr job — `BrowserHost::new_osr` and
      # `OsrHost::new` are scaffolded with `unimplemented!()` until
      # Phase 3 lands. We only verify the feature-gated code compiles
      # and is clippy-clean.
      - name: cargo build (osr)
        run: cargo build --workspace --features osr

      - name: cargo clippy (osr)
        run: cargo clippy --workspace --all-targets --features osr -- -D warnings

  bundle-macos-cross:
    # Cross-bundle the macOS .app on a Linux runner. Catches
    # `xtask bundle-macos` regressions per-PR without paying for a real
    # macOS runner. The resulting bundle is filesystem-correct only —
    # the binaries inside are Linux ELFs and won't run on Darwin. Real
    # macOS smoke testing is deferred to Phase 6.
    name: macOS bundle (cross)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CEF_PATH: ${{ github.workspace }}/vendor/cef/linux64
      # Stub framework dir lets bundle-macos skip the macOS-only CEF
      # tarball and finish assembly using whatever bytes happen to be
      # in the directory we hand it. The contents don't matter — only
      # the bundle script's directory layout does.
      BUFFR_BUNDLE_FRAMEWORK_DIR: ${{ github.workspace }}/.ci/stub-framework
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: install CEF runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libxcomposite1 libxdamage1 libxrandr2 libxkbcommon0 libxshmfence1 \
            libdrm2 libgbm1 libpango-1.0-0 libasound2-dev \
            libx11-xcb1 libxcb-dri3-0 libcups2 libxss1 libxtst6 \
            libxkbcommon0 libxkbcommon-x11-0 libxcb-xkb1 \
            libgl1 libegl1 libgles2 \
            libxml2-utils

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-build

      - name: cache CEF binary distribution
        uses: actions/cache@v5
        with:
          path: vendor/cef
          key: cef-linux64-${{ hashFiles('xtask/src/main.rs') }}

      - name: fetch CEF
        run: cargo xtask fetch-cef

      - name: stage stub macOS framework
        run: |
          mkdir -p "$BUFFR_BUNDLE_FRAMEWORK_DIR/Versions/A/Resources"
          echo stub > "$BUFFR_BUNDLE_FRAMEWORK_DIR/Versions/A/Chromium Embedded Framework"

      - name: cargo xtask bundle-macos
        run: cargo xtask bundle-macos

      - name: validate bundle layout
        run: |
          set -e
          test -f target/debug/buffr.app/Contents/Info.plist
          test -f target/debug/buffr.app/Contents/PkgInfo
          test -f target/debug/buffr.app/Contents/MacOS/buffr
          test -d "target/debug/buffr.app/Contents/Frameworks/Chromium Embedded Framework.framework"
          test -f "target/debug/buffr.app/Contents/Frameworks/buffr Helper.app/Contents/Info.plist"
          test -f "target/debug/buffr.app/Contents/Frameworks/buffr Helper.app/Contents/MacOS/buffr Helper"
          xmllint --noout target/debug/buffr.app/Contents/Info.plist
          xmllint --noout "target/debug/buffr.app/Contents/Frameworks/buffr Helper.app/Contents/Info.plist"

  linux-package:
    # Cross-build the .deb / .rpm / AUR PKGBUILD on a Linux runner. No
    # signing in this round — Phase 6 release pipeline takes that over.
    # The job verifies the bundle scripts produce installable artifacts
    # and that `dpkg-deb -I` / `rpm -qpi` parse the resulting metadata.
    name: linux package (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux64
            deb_arch: amd64
            rpm_arch: x86_64
          - runner: ubuntu-24.04-arm
            platform: linuxarm64
            deb_arch: arm64
            rpm_arch: aarch64
    env:
      CEF_PATH: ${{ github.workspace }}/vendor/cef/${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: install CEF runtime + packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libxcomposite1 libxdamage1 libxrandr2 libxkbcommon0 libxshmfence1 \
            libdrm2 libgbm1 libpango-1.0-0 libasound2-dev \
            libx11-xcb1 libxcb-dri3-0 libcups2 libxss1 libxtst6 \
            libxkbcommon0 libxkbcommon-x11-0 libxcb-xkb1 \
            libgl1 libegl1 libgles2 \
            dpkg dpkg-dev fakeroot file \
            rpm

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-package-${{ matrix.platform }}

      - name: cache CEF binary distribution
        uses: actions/cache@v5
        with:
          path: vendor/cef
          key: cef-${{ matrix.platform }}-${{ hashFiles('xtask/src/main.rs') }}

      - name: fetch CEF
        run: cargo xtask fetch-cef --target ${{ matrix.platform }}

      - name: cargo xtask package-linux (release)
        run: cargo xtask package-linux --release --variant all

      - name: list artifacts
        run: ls -la target/dist/linux/

      - name: validate .deb metadata
        run: |
          set -e
          shopt -s nullglob
          debs=(target/dist/linux/buffr-*-${{ matrix.deb_arch }}.deb)
          if [ ${#debs[@]} -eq 0 ]; then
            echo "::error::no .deb produced"
            exit 1
          fi
          dpkg-deb -I "${debs[0]}"
          dpkg-deb -c "${debs[0]}" | head -30
          echo "deb OK: ${debs[0]}"

      - name: validate .rpm metadata
        run: |
          set -e
          shopt -s nullglob
          rpms=(target/dist/linux/buffr-*-${{ matrix.rpm_arch }}.rpm)
          if [ ${#rpms[@]} -eq 0 ]; then
            echo "::error::no .rpm produced"
            exit 1
          fi
          rpm -qpi "${rpms[0]}"
          rpm -qpl "${rpms[0]}" | head -30
          echo "rpm OK: ${rpms[0]}"

      - name: validate PKGBUILD
        run: |
          set -e
          test -f pkg/aur/PKGBUILD
          grep -q '^pkgname=buffr$' pkg/aur/PKGBUILD
          grep -q '^pkgver=' pkg/aur/PKGBUILD
          grep -q "sha256sums=('SKIP')" pkg/aur/PKGBUILD
          echo "PKGBUILD OK"

  macos-package:
    # Build the macOS .app + .dmg on a real macOS runner. Independent
    # of the linux job — a CEF download failure here does not gate
    # main. Unsigned this round; signing + notarization land in the
    # eventual release.yml workflow.
    name: macOS package (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: macosarm64
          - runner: macos-13
            platform: macosx64
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-build-${{ matrix.platform }}

      - name: cache CEF binary distribution
        uses: actions/cache@v5
        with:
          path: vendor/cef
          key: cef-${{ matrix.platform }}-${{ hashFiles('xtask/src/main.rs') }}

      - name: fetch CEF (${{ matrix.platform }})
        run: cargo xtask fetch-cef --target ${{ matrix.platform }}

      - name: cargo xtask bundle-macos
        run: cargo xtask bundle-macos --release

      - name: cargo xtask package-macos-dmg
        run: cargo xtask package-macos-dmg --release

      - name: list artifacts
        run: ls -la target/dist/macos/

      - name: validate dmg exists
        run: |
          set -e
          shopt -s nullglob
          dmgs=(target/dist/macos/buffr-*.dmg)
          if [ ${#dmgs[@]} -eq 0 ]; then
            echo "::error::no DMG produced"
            exit 1
          fi
          echo "DMG OK: ${dmgs[0]}"

      - name: upload dmg
        uses: actions/upload-artifact@v7
        with:
          name: buffr-macos-dmg-${{ matrix.platform }}
          path: target/dist/macos/buffr-*.dmg
          if-no-files-found: error
          retention-days: 14

  windows-package:
    # Build the Windows MSI on a real Windows runner. WiX 3 toolset
    # ships preinstalled on `windows-latest`; we still install
    # explicitly via choco to lock the version. Independent of the
    # linux job — a CEF download failure here does not gate main.
    # Unsigned this round; Authenticode signing lives in release.yml.
    name: Windows package (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: windows64
            rust_target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            platform: windowsarm64
            rust_target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build-${{ matrix.platform }}

      - name: install WiX 3 toolset
        run: choco install -y wixtoolset
        shell: powershell

      - name: add WiX to PATH
        # WiX 3 installs candle.exe + light.exe under
        # C:\Program Files (x86)\WiX Toolset v3.x\bin\.
        run: echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: cache CEF binary distribution
        uses: actions/cache@v5
        with:
          path: vendor/cef
          key: cef-${{ matrix.platform }}-${{ hashFiles('xtask/src/main.rs') }}

      - name: fetch CEF (${{ matrix.platform }})
        run: cargo xtask fetch-cef --target ${{ matrix.platform }}

      - name: cargo build (release)
        run: cargo build --release -p buffr-bin -p buffr-helper

      - name: cargo xtask package-windows-msi
        run: cargo xtask package-windows-msi --release

      - name: list artifacts
        run: dir target\dist\windows\
        shell: cmd

      - name: validate msi exists
        run: |
          $msis = Get-ChildItem target\dist\windows\buffr-*.msi -ErrorAction SilentlyContinue
          if ($msis.Count -eq 0) {
            Write-Error "no MSI produced"
            exit 1
          }
          Write-Host "MSI OK: $($msis[0].FullName)"
        shell: powershell

      - name: upload msi
        uses: actions/upload-artifact@v7
        with:
          name: buffr-windows-msi-${{ matrix.platform }}
          path: target/dist/windows/buffr-*.msi
          if-no-files-found: error
          retention-days: 14
