name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  linux:
    name: linux build + lint
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: install CEF runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config \
            libgtk-3-dev libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libxcomposite1 libxdamage1 libxrandr2 libxkbcommon0 libxshmfence1 \
            libdrm2 libgbm1 libpango-1.0-0 libasound2-dev \
            libx11-xcb1 libxcb-dri3-0 libcups2 libxss1 libxtst6

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-build

      - name: cache CEF binary distribution
        uses: actions/cache@v4
        with:
          path: vendor/cef
          key: cef-linux64-${{ hashFiles('xtask/src/main.rs') }}

      - name: fetch CEF
        run: cargo xtask fetch-cef

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace -- --nocapture
        # Smoke test (window opens, page loads) is skipped here — it
        # needs a display server. The successful build is the smoke.
