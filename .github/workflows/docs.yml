name: docs

# Builds the mdBook docs site on every push to main and uploads the
# result to GitHub Pages. The `gh-pages` branch / `docs.buffr.kryptic.sh`
# subdomain configuration is a TODO — until DNS lands the site is
# only reachable through the github.io preview URL Actions emits.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "book.toml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs
  cancel-in-progress: true

jobs:
  build:
    name: build mdBook
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          set -euo pipefail
          version="0.4.40"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${version}/mdbook-v${version}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Lint SUMMARY.md parses
        run: |
          # Sanity check: every entry in docs/SUMMARY.md must point at
          # an existing file. mdbook build will catch this too, but
          # this fails fast with a readable message.
          set -euo pipefail
          missing=0
          while IFS= read -r path; do
            if [ -n "$path" ] && [ ! -f "docs/$path" ]; then
              echo "::error::SUMMARY.md references missing file: docs/$path"
              missing=1
            fi
          done < <(grep -oE '\(\./[^)]+\)' docs/SUMMARY.md | sed 's/(\.\///;s/)$//')
          test "$missing" -eq 0

      - name: Build site
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    name: deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
